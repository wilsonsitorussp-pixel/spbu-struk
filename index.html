<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPBU PRO ADVANCED</title>

<style>
body{font-family:Arial;background:#0f1117;color:#fff;padding:10px}
.panel{background:#1a1d27;padding:12px;margin-bottom:10px;border-radius:12px}
input,select,textarea{width:100%;margin:6px 0;padding:8px;border-radius:6px;border:none}
button{padding:10px;border:none;border-radius:8px;cursor:pointer}

.receipt{background:#fff;color:#000;width:58mm;margin:auto;padding:6px;text-align:center}
.logo-img{display:block;margin:auto}
.r-line{border-top:1px dashed #000;margin:6px 0}

.op-item{display:flex;justify-content:space-between;margin:4px 0}
</style>
</head>

<body>

<div class="panel">
<h3>Header</h3>
<textarea id="inAlamat">SPBU POLONIA\nMEDAN</textarea>
</div>

<div class="panel">
<h3>Logo</h3>
<input type="file" id="fileLogo">
<select id="logoWidth">
<option value="20">20mm</option>
<option value="30" selected>30mm</option>
<option value="40">40mm</option>
</select>
</div>

<div class="panel">
<h3>Operator</h3>
<input id="newOp" placeholder="Tambah operator">
<button onclick="addOp()">Tambah</button>
<div id="opList"></div>
<select id="opSelect"></select>
</div>

<div class="panel">
<h3>Transaksi</h3>
<input id="harga" type="number" value="10000">
<input id="liter" type="number" value="5">
<button onclick="generateTrans()">Generate No Transaksi</button>
<input id="trans">
</div>

<div class="panel">
<h3>Font</h3>
<input type="range" id="fontSize" min="5" max="15" value="9">
</div>

<div class="panel">
<button onclick="render()">Preview</button>
<button onclick="window.print()">Print</button>
</div>

<div class="receipt" id="struk">
<img id="logo" class="logo-img">
<div id="alamat"></div>
<div class="r-line"></div>
<div id="data"></div>
</div>

<script>
let logoData = localStorage.getItem('logo') || '';
let operators = JSON.parse(localStorage.getItem('ops')||'[]');

// LOGO
fileLogo.onchange = e => {
 let r = new FileReader();
 r.onload = () => {
  logoData = r.result;
  localStorage.setItem('logo', logoData);
  render();
 };
 r.readAsDataURL(e.target.files[0]);
};

// OPERATOR
function addOp(){
 let val = newOp.value.trim().toUpperCase();
 if(!val) return;
 operators.push(val);
 localStorage.setItem('ops', JSON.stringify(operators));
 newOp.value='';
 loadOps();
}

function loadOps(){
 opList.innerHTML = operators.map((o,i)=>
 `<div class='op-item'>${o} <button onclick='delOp(${i})'>X</button></div>`).join('');
 opSelect.innerHTML = operators.map(o=>`<option>${o}</option>`).join('');
}

function delOp(i){
 operators.splice(i,1);
 localStorage.setItem('ops', JSON.stringify(operators));
 loadOps();
}

// TRANSAKSI
function generateTrans(){
 trans.value = Math.floor(100000+Math.random()*900000);
}

// RENDER
function render(){
 let h = parseFloat(harga.value)||0;
 let l = parseFloat(liter.value)||0;
 let t = h*l;

 struk.style.fontSize = fontSize.value+'px';

 if(logoData){
  logo.src = logoData;
  logo.style.width = logoWidth.value+'mm';
 } else logo.style.display='none';

 alamat.innerText = inAlamat.value;
 data.innerHTML = `
 No: ${trans.value}<br>
 Harga: ${h}<br>
 Liter: ${l}<br>
 Total: ${t}<br>
 Operator: ${opSelect.value}
 `;
}

loadOps();
render();
</script>

</body>
</html>
